name: Deploy

on:
  push:
    branches: [frontend_main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci.frontend.yml'
      - '.github/workflows/deploy.frontend.yml'

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.FRONTEND_PROJECT_DIR }}
            git fetch --all
            git checkout frontend_main
            git pull origin frontend_main
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .deploy.env
            docker compose --env-file .deploy.env up -d --build --remove-orphans
            docker image prune -f