services:
  postgres:
    image: postgres:16
    container_name: db
    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    env_file:
      - db.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data:
