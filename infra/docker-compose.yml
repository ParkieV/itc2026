services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - db.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    network_mode: host

  backend:
    container_name: backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"
    build:
      context: ../backend
      dockerfile: ../backend/run/Dockerfile
    network_mode: host

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    network_mode: host
    depends_on:
      - backend

volumes:
  postgres_data:
